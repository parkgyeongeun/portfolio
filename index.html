<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyeongeun Park — Portfolio</title>
<meta name="description" content="Gyeongeun Park — Brand & UX Designer based in Seoul">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============================================================
     HOME 화면 — 첫 페이지. 상단 3분할(이름 | Works | 링크) + 좌하단 시계.
     Works를 누르면 이 화면은 숨겨지고 아래 WORKS 화면(소개+프로젝트)으로 전환됩니다.
============================================================= -->
<div class="home-screen" id="home-screen">

  <div class="home-header">
    <div class="home-col home-left">
      <p class="logo-static">GYEONGEUN PARK</p>
      <p class="tagline">
        still working on design:<br>
        brand identity, typography,<br>
        graphic and illustration.
      </p>
    </div>

    <div class="home-col home-center">
      <!-- 클릭하면 아래 WORKS 화면으로 전환됩니다. -->
      <button class="works-toggle" type="button" id="works-toggle-home">Works</button>
    </div>

    <div class="home-col home-right">
      <a href="https://www.instagram.com/p.arles" target="_blank" rel="noopener">Instagram</a>
      <a href="#" target="_blank" rel="noopener">Behance</a>
      <a href="mailto:ruddms4760@gmail.com">Mail</a>
    </div>
  </div>

  <!-- 실시간 시계 + 날짜 — 화면 좌하단에 옅은 회색으로 표시 -->
  <div class="home-status">
    <div class="clock" id="clock">00:00:00</div>
    <div class="today" id="today"></div>
  </div>

</div>

<!-- ============================================================
     WORKS 화면 — Works 클릭 시 전환. 왼쪽 = 디자이너 소개(고정), 오른쪽 = 프로젝트 콘텐츠(스크롤).
     두 영역은 역할이 분리되어 있으며, 사이 간격을 넓게 두어 붙어 보이지 않게 합니다.
============================================================= -->
<div class="layout" id="works-screen" hidden>

  <!-- ============================================================
       LEFT — 디자이너 소개. 이름 / 소개 문구 / 연락처만 있습니다.
       이름을 클릭하면 다시 HOME 화면으로 돌아갑니다.
  ============================================================= -->
  <aside class="sidebar">
    <button class="logo-static" type="button" id="logo-back">GYEONGEUN PARK</button>

    <p class="tagline">
      still working on design:<br>
      brand identity, typography,<br>
      graphic and illustration.
    </p>

    <!-- 하단 링크 — 사이드바 맨 아래 고정. -->
    <nav class="nav-links">
      <a href="https://www.instagram.com/p.arles" target="_blank" rel="noopener">Instagram</a>
      <a href="#" target="_blank" rel="noopener">Behance</a>
      <a href="mailto:ruddms4760@gmail.com">Mail</a>
    </nav>
  </aside>

  <!-- ============================================================
       RIGHT — 프로젝트 콘텐츠. 3개 프로젝트가 세로로 이어지는 스크롤 구조.
       .project-section 하나 = 프로젝트 한 개 (Title → 이미지 슬라이더 →
       Project Information → Description 순서).
       - .work-title        : 제목
       - .work-slider       : 이미지 슬라이더. .slider-track 안에 <img>를
                              한 줄씩 추가/삭제하면 이미지가 늘어나거나 줄어듭니다.
       - .meta-row          : "라벨 : 값" 한 줄
       - .work-desc         : 설명 문단
  ============================================================= -->
  <main class="main">
    <!-- BUILDER:PROJECTS:START -->
    <!-- 프로젝트가 없습니다. builder.html에서 프로젝트를 만들고
         "웹사이트에 올리기"를 누르면 여기에 자동으로 추가됩니다. -->
    <!-- BUILDER:PROJECTS:END -->
  </main>

</div>

<script src="script.js"></script>
</body>
</html>
